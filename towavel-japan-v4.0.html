<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Towavel Japan｜国内弾丸ドライブ旅プランナー</title>
<style>
:root{
--teal:#2E6BDF;--teal-dk:#1E4FB8;--teal-bg:#E9F0FD;--teal-bd:#5583E8;
--orange:#F8861D;--ink:#333F52;--ink2:#5B6878;--mut:#98A5B2;--mut2:#C2CBD3;
--bg:#F3F5F6;--line:#E9EDF0;--red:#E5443C;--blue:#4A7CF0;--amber:#F5A623;
--sh:0 8px 24px rgba(51,63,82,.07);--sh2:0 2px 10px rgba(51,63,82,.06);
--teal-dis:#B7CCF5;--ring:rgba(46,107,223,.5);--want-bg:#A9C4F6;--want-bd:#6E93EC;--want-tx:#1D3E8F;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:#E7EBEE;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif}
button{font-family:inherit;color:inherit}
:focus-visible{outline:3px solid var(--ring);outline-offset:2px;border-radius:8px}
.stage{display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 44px rgba(30,45,60,.14)}
@media(max-width:480px){body{background:var(--bg)}.phone{max-width:none;box-shadow:none}}
.screen{display:none;min-height:100vh;animation:fadein .22s ease}
.screen.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hd{position:sticky;top:0;z-index:60;background:#fff;display:flex;align-items:center;gap:8px;padding:10px 14px;min-height:60px}
.hd .back{background:none;border:0;padding:6px;cursor:pointer;display:flex;border-radius:10px}
.hd .ttl{font-size:21px;font-weight:800;line-height:1.2}
.hd .sub{font-size:13.5px;color:var(--mut);font-weight:600;margin-top:2px}
.hd.center .ttl{position:absolute;left:56px;right:56px;text-align:center;font-size:19px}
.prog{position:absolute;left:0;bottom:0;height:4px;background:var(--teal);border-radius:0 3px 3px 0;transition:width .35s}
.home-top{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand b{font-size:23px;font-weight:800;letter-spacing:.3px}
.iconbtn{width:46px;height:46px;border-radius:50%;background:#fff;border:0;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:12px 20px 10px;font-size:17px;font-weight:700}
.sec-head .link{background:none;border:0;color:var(--ink2);font-size:14.5px;font-weight:600;cursor:pointer;padding:4px 2px}
.hrow{display:flex;gap:13px;overflow-x:auto;padding:2px 20px 12px;scrollbar-width:thin;scrollbar-color:#C7D0D6 transparent}
.hrow::-webkit-scrollbar{height:5px}
.hrow::-webkit-scrollbar-thumb{background:#C7D0D6;border-radius:99px}
.hrow::-webkit-scrollbar-track{background:transparent;margin:0 22px}
.live-card{flex:0 0 auto;width:186px;cursor:pointer}
.live-ph{position:relative;height:116px;border-radius:18px;overflow:hidden;box-shadow:var(--sh2);background:#DDE7EC}
.live-ph svg{width:100%;height:100%;display:block}
.badge-live{position:absolute;top:9px;left:9px;background:var(--red);color:#fff;font-size:11px;font-weight:800;letter-spacing:.5px;padding:3.5px 9px;border-radius:7px;display:flex;align-items:center;gap:4.5px}
.badge-live:before{content:"";width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.5s infinite}
@keyframes blink{50%{opacity:.25}}
.live-name{margin-top:8px;font-size:15.5px;padding-left:2px}
.jmap-wrap{padding:4px 10px 0}
.jmap-wrap svg{display:block;width:100%;height:auto}
.jp-p{cursor:pointer;fill:#FFFFFF;stroke:#C3CFD6;stroke-width:1.1;stroke-linejoin:round;transition:fill .18s}
.jp-p.on-base{fill:#F5BBCF;stroke:#E48FAF}
.jp-p.on-vis{fill:#F6A75C;stroke:#E8924A}
.jp-p.on-want{fill:var(--want-bg);stroke:var(--want-bd)}
.map-legend{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:8px 20px 6px}
.lg{font-size:11.5px;font-weight:700;color:#5B6878;padding:5px 11px;border-radius:999px;border:1.5px solid #D9E2E8;background:#fff}
.lg.on-base{background:#F5BBCF;border-color:#E48FAF;color:#5A3A2E}
.lg.on-vis{background:#F6A75C;border-color:#E8924A;color:#5A3A2E}
.lg.on-want{background:var(--want-bg);border-color:var(--want-bd);color:var(--want-tx)}
.lg-edit{margin-left:auto;border:1.6px solid var(--teal);background:#fff;color:var(--teal-dk);font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer}
.m-note{color:var(--mut);font-size:12.5px;line-height:1.7;margin:0 0 12px}
.pref-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pchip{padding:10px 2px;border-radius:11px;font-size:12.5px;font-weight:700;border:1.5px solid #E2E8EC;background:#fff;color:#5B6878;cursor:pointer}
.pchip.on-base{background:#F5BBCF;border-color:#E48FAF;color:#5A3A2E}
.pchip.on-vis{background:#F6A75C;border-color:#E8924A;color:#fff}
.pchip.on-want{background:var(--want-bg);border-color:var(--want-bd);color:var(--want-tx)}
.stats-card{margin:4px 20px 2px;background:#fff;border-radius:20px;box-shadow:0 10px 26px rgba(51,63,82,.10);display:flex;padding:15px 0}
.stat-half{flex:1;text-align:center;cursor:pointer}
.stat-half+.stat-half{border-left:1px solid #EDF0F3}

.stat-num.teal{color:var(--teal)}.stat-num.org{color:var(--orange)}
.stat-lab{font-size:14.5px;color:var(--ink2);font-weight:700;margin-top:4px}
.cta-wrap{padding:16px 20px 12px;position:sticky;bottom:0;z-index:50;background:linear-gradient(to top,var(--bg) 62%,rgba(243,245,246,0))}

.cta{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:58px;border:0;border-radius:999px;background:var(--teal);color:#fff;font-size:18px;font-weight:800;letter-spacing:.6px;cursor:pointer;box-shadow:0 0 0 5px rgba(255,140,130,.13),0 12px 26px rgba(255,116,105,.32);transition:transform .12s,background .2s,box-shadow .2s}
.cta:active{transform:scale(.985)}
.cta.disabled{background:var(--teal-dis);box-shadow:none;pointer-events:none}
.empty{padding:66px 24px 46px;text-align:center}
.empty .pl{color:var(--teal);margin-bottom:22px}
.empty h3{font-size:21px;font-weight:800;margin:0 0 10px}
.empty p{font-size:15px;color:var(--mut);margin:0}
.form{padding:16px 20px 130px}
.q-lab{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:15.5px;font-weight:600;margin:22px 2px 10px}
.qic{display:inline-flex;font-size:18px}
.q-box{display:block;width:100%;text-align:left;background:var(--teal-bg);border:2px solid var(--teal-bd);border-radius:14px;padding:19px 20px;font-size:17.5px;font-weight:700;color:var(--ink);cursor:pointer}
.q-h2{font-size:25px;font-weight:800;margin:32px 0 8px}
.q-sub{font-size:15px;color:var(--mut);margin:0 0 18px}
.opt{display:flex;align-items:center;gap:16px;width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;padding:19px 22px;margin-bottom:14px;font-size:18px;font-weight:600;cursor:pointer;box-shadow:var(--sh2);text-align:left;transition:border-color .15s,background .15s}
.opt:active{transform:scale(.99)}
.opt.on{border-color:var(--teal);background:var(--teal-bg)}
.oi{display:inline-flex;font-size:26px;flex:0 0 auto}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--sh2)}
.panel h4{margin:4px 0 10px;font-size:14px;color:var(--mut);font-weight:700}
.panel h4+.chips{margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{border:1.6px solid #D7DDE2;background:#fff;color:var(--ink2);border-radius:999px;padding:10px 16px;font-size:15px;font-weight:700;cursor:pointer}
.chip.on{border-color:var(--teal);background:var(--teal-bg);color:var(--teal-dk)}
.date-inp{border:1.6px solid #D7DDE2;border-radius:999px;padding:9px 14px;font-size:14.5px;font-family:inherit;color:var(--ink);background:#fff}
.budget-h{font-size:26px;font-weight:800;margin:36px 0 6px}
.budget-sub{color:var(--mut);font-size:15px;margin:0 0 30px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;background:#E2E7EA;outline:none;margin:8px 0 4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--teal);cursor:pointer;box-shadow:0 3px 9px var(--ring)}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--teal);border:0;cursor:pointer}
.slider-labs{display:flex;justify-content:space-between;margin-top:14px;font-size:15px;color:var(--mut);font-weight:600}
.slider-labs .on{color:var(--orange);font-weight:800}
.swipe-body{padding:14px 18px 34px;display:flex;flex-direction:column;min-height:calc(100vh - 74px)}
.dest-card{background:#fff;border-radius:24px;box-shadow:0 14px 36px rgba(51,63,82,.11);padding:20px 18px;touch-action:pan-y;user-select:none;-webkit-user-select:none;cursor:grab}
.dc-title{font-size:23px;font-weight:800;margin:2px 4px 14px}
.ph{position:relative;border-radius:14px;overflow:hidden;background:#DDE7EC}
.ph svg{width:100%;height:100%;display:block}
.ph.hero{height:200px}
.badge{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.95);color:var(--ink);font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px}
.badge,.badge-live{z-index:2}
img.real{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
img.real.on{opacity:1}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:16px 0 14px}
.stat{background:#F5F7F8;border-radius:15px;padding:13px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.mk{width:19px;height:19px;display:block}
.mk-g{width:12px;height:12px;border:3.4px solid var(--blue);border-radius:50%;box-sizing:content-box}
.stat-l{display:flex;align-items:center;gap:4px;color:var(--mut);font-size:11px;font-weight:600;line-height:1}
.stat-l svg{width:12px;height:12px}
.stat-v{font-size:14.5px;font-weight:800;line-height:1.25}
.stat-sub{font-size:10.5px;font-weight:700}
.warn{color:var(--orange)}.ok{color:var(--teal-dk)}
.bb{border:1.5px solid #E4E9EC;border-radius:18px;padding:16px;background:#fff}
.bb-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px}
.bb-head .l{font-size:15.5px;font-weight:800}
.bb-head em{font-style:normal;color:var(--mut);font-weight:600;font-size:13px}
.bb-total{color:var(--orange);font-weight:800;font-size:15px;white-space:nowrap}
.bb-total b{font-size:29px;letter-spacing:.3px}
.bb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.bb-cell{background:#F5F7F8;border-radius:13px;text-align:center;padding:12px 4px}
.bb-cell .k{font-size:12px;color:var(--mut);font-weight:600;margin-bottom:5px}
.bb-cell .v{font-size:15px;font-weight:800}
.bb-note{font-size:11.5px;color:var(--mut);margin-top:11px}
.swipe-btns{display:flex;justify-content:center;gap:32px;margin-top:auto;padding-top:28px}
.cbtn{width:72px;height:72px;border-radius:50%;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.cbtn:active{transform:scale(.9)}
.cbtn.skip{background:#7C8794;box-shadow:0 9px 22px rgba(124,135,148,.38)}
.cbtn.like{background:#F0862C;box-shadow:0 9px 22px rgba(240,134,44,.42)}
.swipe-count{text-align:center;color:var(--mut);font-size:13px;font-weight:600;margin-top:14px}
.fly-r{transform:translateX(150%) rotate(15deg)!important;opacity:0;transition:transform .34s ease,opacity .34s ease!important}
.fly-l{transform:translateX(-150%) rotate(-15deg)!important;opacity:0;transition:transform .34s ease,opacity .34s ease!important}
.res-list{padding:14px 18px 44px}
.res-card{background:#fff;border-radius:22px;box-shadow:var(--sh);padding:18px;margin-bottom:18px;cursor:pointer}
.res-top{display:flex;gap:14px}
.res-th{flex:0 0 96px;height:96px;border-radius:16px;overflow:hidden;background:#DDE7EC;position:relative}
.res-th svg{width:100%;height:100%;display:block}
.res-tt{flex:1;min-width:0;position:relative;padding-right:22px}
.res-name{font-size:19px;font-weight:800;line-height:1.25}
.res-desc{font-size:13.5px;color:var(--ink2);line-height:1.55;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.res-chev{position:absolute;right:-6px;top:0;color:#C2CBD3}
.res-stats{display:grid;grid-template-columns:1.2fr 1fr 1fr .85fr;border-top:1px solid #EFF2F4;border-bottom:1px solid #EFF2F4;margin:15px 0 13px;padding:12px 0}
.rs{text-align:center;padding:0 3px}
.rs+.rs{border-left:1px solid #EFF2F4}
.rs .k{font-size:12px;color:var(--mut);font-weight:600;margin-bottom:5px}
.rs .v{font-size:14px;font-weight:800}
.rs .s{font-size:10.5px;font-weight:700;margin-top:3px}
.res-foot{display:flex;justify-content:space-between;align-items:baseline}
.res-foot .k{font-size:15px;font-weight:800}
.res-foot .v{color:var(--orange);font-weight:800;font-size:15px}
.res-foot .v b{font-size:27px}
.dt-body{padding:0 0 46px}
.dt-hero{height:206px;margin:8px 18px 0;border-radius:18px}
.dt-sum{margin:16px 18px 6px;background:#FEF6EC;border:1.5px solid #F6C68C;border-radius:18px;padding:16px}
.dt-sum .bb-cell{background:#fff}
.dt-note{font-size:12.5px;color:var(--mut);margin:10px 22px 2px;line-height:1.6}
.dt-actions{display:flex;gap:9px;padding:12px 18px 6px;flex-wrap:wrap}
.pill-btn{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1.6px solid var(--teal);color:var(--teal-dk);background:#fff;padding:10px 15px;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none}
.pill-btn svg{width:15px;height:15px}
.pill-btn.fill{background:var(--teal);border-color:var(--teal);color:#fff}
.pill-btn.done{border-color:#D7DDE2;color:var(--mut);background:#F5F7F8}
.band{background:#fff;padding:22px 0 16px;margin-top:14px}
.band h3{font-size:20px;font-weight:800;margin:0 20px 15px}
.spot-card{flex:0 0 auto;width:300px;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--sh2)}
.spot-ph{height:156px;border-radius:0}
.spot-bd{padding:13px 15px 16px}
.spot-n{font-size:17px;font-weight:800}
.spot-d{font-size:13px;color:var(--ink2);line-height:1.65;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hotel-ph{height:184px;border-radius:0}
.stars{color:var(--orange);font-size:15px;letter-spacing:2.5px;margin-top:7px}
.price-y{color:var(--orange);font-weight:800;font-size:21px;margin-top:11px;padding-top:11px;border-top:1px solid #EFF2F4}
.price-y span{color:var(--mut);font-weight:600;font-size:13px}
.eat-meta{display:flex;gap:12px;align-items:baseline;margin-top:9px;font-size:13.5px;font-weight:800}
.eat-meta .st{color:var(--orange)}
.eat-meta .pr{color:var(--ink2);font-weight:700}
.course{margin:0 18px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:6px 16px;box-shadow:var(--sh2)}
.c-row{display:flex;gap:14px;padding:13px 2px;border-bottom:1px dashed #E8ECEF;align-items:baseline}
.c-row:last-child{border-bottom:0}
.c-t{color:var(--teal-dk);font-weight:800;font-size:13.5px;flex:0 0 46px}
.c-x{font-size:14.5px;font-weight:600;line-height:1.5}
.alt-divider{display:flex;align-items:center;gap:12px;color:var(--teal);font-weight:800;font-size:14.5px;margin:28px 2px 18px}
.alt-divider:before,.alt-divider:after{content:"";flex:1;height:1.5px;background:var(--want-bd);opacity:.65}
.foot-note{color:var(--mut2);font-size:11.5px;text-align:center;margin:24px 20px 0;line-height:1.7}
.veil{position:fixed;inset:0;background:rgba(24,34,45,.46);display:flex;align-items:flex-end;justify-content:center;z-index:120;animation:fadein .18s}
.veil.hidden{display:none}
.modal{width:100%;max-width:430px;background:#fff;border-radius:26px 26px 0 0;padding:22px 20px 30px;max-height:80vh;overflow:auto;animation:up .26s ease}
@keyframes up{from{transform:translateY(36px);opacity:.5}to{transform:none;opacity:1}}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.m-head b{font-size:19px}
.m-x{border:0;background:#F0F3F5;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--ink2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.m-sub{margin:14px 0 10px;color:var(--mut);font-size:14px;font-weight:700}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(16px);bottom:34px;background:#2A3547;color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.28s;z-index:200;max-width:86%;text-align:center;box-shadow:0 10px 26px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="stage"><div class="phone">
<section id="scr-home" class="screen active"></section>
<section id="scr-setup" class="screen"></section>
<section id="scr-swipe" class="screen"></section>
<section id="scr-results" class="screen"></section>
<section id="scr-detail" class="screen"></section>
<div id="veil" class="veil hidden"><div class="modal" id="modalBox"></div></div>
<div id="toast" class="toast" role="status"></div>
</div></div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const p2=n=>String(n).padStart(2,'0');
const fdate=d=>d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate());
const sdate=d=>(d.getMonth()+1)+'/'+d.getDate();
const isoDate=d=>d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const man=v=>v.toFixed(1);
const yen=v=>v.toLocaleString('ja-JP');
const fh=h=>(h%1?h.toFixed(1):String(h));
let toastT=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2300);}
/* ============================================================
   ★写真の差し替えはここに追加（USER_PHOTOS）★
   'キー':'画像URL' を書くだけで、その場所の写真が置き換わります。
   利用許可を得た画像のURLや、このHTMLと同じ場所に置いた
   画像 './img/xxx.jpg' も指定できます。
   キーの種類:
     大きな写真(一覧・スワイプ・詳細) → 旅先id
       kamakura hakone kawaguchiko chichibu izu choshi nikko
       karuizawa kusatsu matsumoto sendai kanazawa kyoto
     詳細の観光スポット3枚 → '旅先id-1' '旅先id-2' '旅先id-3'
   例:
     nikko:'https://example.com/chuzenji.jpg',
     'nikko-2':'./img/kegon.jpg',
   ============================================================ */
const USER_PHOTOS={
};
const ICO={

const ORIGIN_PREF=[['神奈川'],['東京'],['千葉','埼玉']];
function basePrefs(){return state.search.origin==null?['神奈川']:ORIGIN_PREF[state.search.origin];}
function prefClass(p){
 if(basePrefs().indexOf(p)>=0)return 'on-base';
 if(state.visited.indexOf(p)>=0)return 'on-vis';
 for(var i=0;i<state.favs.length;i++){if(byId(state.favs[i]).pref===p)return 'on-want';}
 return '';
}
function buildJmap(){
 var out='<svg viewBox="0 0 1000 1000" role="img" aria-label="日本地図（都道府県の記録）">';
 out+='<g transform="matrix(1.028807,0,0,1.028807,-47.544239,-28.806583)"><g transform="translate(6,18)">';
 out+='<line x1="320.2" y1="362" x2="582.4" y2="109.4" stroke="#C3CFD6" stroke-width="2.5" stroke-linecap="round"/>';
 out+='<line x1="277.3" y1="380.2" x2="46.2" y2="380.2" stroke="#C3CFD6" stroke-width="2.5" stroke-linecap="round"/>';
 for(var i=0;i<PREF_LIST.length;i++){
  var p=PREF_LIST[i],o=JP_PATHS[p];
  out+='<g class="jp-p '+prefClass(p)+'" id="jp-'+p+'" transform="translate('+o.t+')" onclick="togglePref(\''+p+'\')"><title>'+p+'</title><path d="'+o.d+'"/></g>';
 }
 out+='</g></g></svg>';
 return out;
}
function togglePref(p){
 if(basePrefs().indexOf(p)>=0){toast('拠点の県です 🏠');return;}
 var i=state.visited.indexOf(p);
 if(i>=0){state.visited.splice(i,1);toast(p+'を未踏に戻しました');}
 else{state.visited.push(p);toast(p+'を「行った県」に追加しました');}
 var el=document.getElementById('jp-'+p);
 if(el)el.setAttribute('class','jp-p '+prefClass(p));
 var ch=document.getElementById('pc-'+p);
 if(ch)ch.setAttribute('class','pchip '+prefClass(p));
 var c=document.getElementById('cntVisited');
 if(c)c.textContent=state.visited.length;
}

function dTitle(d){var a=d.area||d.pref;return d.emoji+' '+d.name+(d.name.indexOf(a)>=0?'':'（'+a+'）');}
function partyN(){return state.search.party==null?2:PARTY[state.search.party].n;}
function nightsN(){return state.search.nights==null?1:state.search.nights;}
function calcBudget(d){
 const n=partyN(),nt=nightsN(),days=nt+1,inc=state.search.inc;
 const trans=inc.trans?d.gasToll/n:0;
 const stay=inc.stay?nt*d.stayPP:0;
 const food=inc.food?days*d.foodPP:0;
 return {trans:trans,stay:stay,food:food,total:trans+stay+food,n:n,nt:nt,inc:inc};
}
function markIco(m){
 if(m==='g')return '<span class="mk mk-g"></span>';
 if(m==='m')return '<svg class="mk" viewBox="0 0 20 20"><path d="M10 3.2 17.8 17H2.2Z" fill="none" stroke="#F5A623" stroke-width="2.6" stroke-linejoin="round"/></svg>';
 return '<svg class="mk" viewBox="0 0 20 20"><path d="M4.5 4.5l11 11M15.5 4.5l-11 11" stroke="#E5443C" stroke-width="3" stroke-linecap="round"/></svg>';
}
function mTrans(v){return v<=0.5?'g':(v<=1.1?'m':'b');}
function mDrive(h){return h<=2?'g':(h<=3.5?'m':'b');}
function mClim(hi){return hi<=29?'g':(hi<=32?'m':'b');}
function mPrice(p){return (p==='安い'||p==='普通')?'g':(p==='やや高い'?'m':'b');}
function driveSub(h){return h<=2?{t:'ノンストップ可',c:'ok'}:(h<=4?{t:'休憩1回〜',c:'warn'}:{t:'休憩2回〜',c:'warn'});}
function findCandidates(){
 const s=state.search,R=RANGES[s.range],B=BUDGETS[s.budget],th=THEMES[s.theme].k;
 let pool=DEST.filter(d=>d.hours>R.min&&d.hours<=R.max);
 if(!pool.length)pool=DEST.slice();
 const scored=pool.map(d=>{const b=calcBudget(d);const st=(s.style==null||s.style===2)?0:((s.style===0?d.badge==='王道スポット':d.badge==='穴場')?0:1);return{d:d,b:b,tm:d.themes.indexOf(th)>=0?0:1,st:st,bf:(b.total>=B.lo&&b.total<=B.hi)?0:1,r:Math.random()};});
 scored.sort((a,c)=>a.tm-c.tm||a.st-c.st||a.bf-c.bf||a.r-c.r);
 const seen={},first=[],rest=[];
 for(var i=0;i<scored.length;i++){var a=scored[i].d.area||scored[i].d.pref;if(!seen[a]){seen[a]=1;first.push(scored[i]);}else{rest.push(scored[i]);}}
 return first.concat(rest).slice(0,10).map(x=>x.d.id);
}
function nav(id){
 state.screen=id;
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 $('#scr-'+id).classList.add('active');
 window.scrollTo(0,0);
}

const wikiCache={};
function wikiThumb(title,cb){
 if(Object.prototype.hasOwnProperty.call(wikiCache,title)){var c=wikiCache[title];cb(c&&c.b,c&&c.s);return;}
 if(typeof fetch==='undefined'){wikiCache[title]=null;cb(null,null);return;}
 fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title))
 .then(function(r){return r.ok?r.json():null;})
 .then(function(j){
  if(!(j&&j.thumbnail&&j.thumbnail.source)){wikiCache[title]=null;cb(null,null);return;}
  var s=j.thumbnail.source,b=s;
  var ow=(j.originalimage&&j.originalimage.width)||0;
  if(ow>=640){b=s.replace(/\/\d+px-/,'/640px-');}
  else if(j.originalimage&&j.originalimage.source){b=j.originalimage.source;}
  wikiCache[title]={b:b,s:s};
  cb(b,b===s?null:s);
 })
 .catch(function(){wikiCache[title]=null;cb(null,null);});
}
function heroKey(d){return USER_PHOTOS[d.id]||d.photo||(WIKI[d.id]&&WIKI[d.id].h)||d.mapq;}
function spotKey(d,i,s){return USER_PHOTOS[d.id+'-'+(i+1)]||s.photo||(WIKI[d.id]&&WIKI[d.id].s&&WIKI[d.id].s[i])||s.n;}
function hydratePhotos(){
 if(!state.photos)return;
 document.querySelectorAll('[data-photo]').forEach(function(el){
  if(el.getAttribute('data-hyd'))return;
  el.setAttribute('data-hyd','1');
  var key=el.getAttribute('data-photo');
  var put=function(u,fb){
   if(!u)return;
   var im=document.createElement('img');
   im.className='real';im.alt='';im.decoding='async';im.referrerPolicy='no-referrer';
   im.onload=function(){im.classList.add('on');};
   im.onerror=function(){if(im.parentNode)im.parentNode.removeChild(im);if(fb)put(fb,null);};
   el.insertBefore(im,el.firstChild);
   im.src=u;
  };
  if(/^(https?:|\.{0,2}\/)/.test(key)){put(key,null);}
  else{wikiThumb(key,function(b,s){put(b,s);});}
 });
}

const QDEFS=[
 {id:'date',lab:'日付を選ぶ',ic:'plane'},
 {id:'party',lab:'誰と行きますか？',ic:'people'},
 {id:'theme',lab:'メインの旅行テーマは？',ic:'target'},
 {id:'style',lab:'旅のスタイルは？',ic:'hsm'},
 {id:'range',lab:'どこまで走る？（片道）',ic:'car'},
 {id:'origin',lab:'出発地はどこですか？',ic:'pin'}
];
function qValue(id){
 const s=state.search;
 if(id==='date'){if(s.date==null||s.nights==null)return null;const st=new Date(s.date);return s.nights===0?fdate(st)+'（日帰り）':fdate(st)+' から '+fdate(addD(st,s.nights));}
 if(id==='party')return s.party==null?null:PARTY[s.party].label;
 if(id==='theme')return s.theme==null?null:THEMES[s.theme].k;
 if(id==='style')return s.style==null?null:STYLES[s.style];
 if(id==='range')return s.range==null?null:RANGES[s.range].label;
 if(id==='origin')return s.origin==null?null:ORIGINS[s.origin];
 return null;
}
function dateOpts(){const t=new Date();const off=(6-t.getDay()+7)%7;return[{l:'今日',d:t},{l:'明日',d:addD(t,1)},{l:'今週末（土）',d:addD(t,off)}];}
function qExpanded(id){
 if(id==='date'){
  const dchips=dateOpts().map((o,i)=>'<button class="chip '+(state.tmpDateIdx===i?'on':'')+'" onclick="pickDate('+i+')">'+o.l+'</button>').join('');
  const custom='<input class="date-inp" type="date" value="'+(state.tmpDate?isoDate(state.tmpDate):'')+'" onchange="pickDateCustom(this.value)" aria-label="出発日を指定">';
  const nlabs=['日帰り','1泊2日','2泊3日','3泊4日'];
  const nchips=nlabs.map((l,i)=>'<button class="chip '+(state.tmpNights===i?'on':'')+'" onclick="pickNights('+i+')">'+l+'</button>').join('');
  return '<div class="panel"><h4>出発日</h4><div class="chips">'+dchips+custom+'</div><h4>泊数</h4><div class="chips">'+nchips+'</div></div>';
 }
 if(id==='party')return PARTY.map((p,i)=>'<button class="opt '+(state.search.party===i?'on':'')+'" onclick="pickParty('+i+')"><span class="oi" style="color:var(--teal)">'+ICO.people+'</span>'+p.label+'</button>').join('');
 if(id==='theme')return THEMES.map((t,i)=>'<button class="opt '+(state.search.theme===i?'on':'')+'" onclick="pickTheme('+i+')"><span class="oi">'+ICO[t.ic]+'</span>'+t.k+'</button>').join('');
 if(id==='style'){var sic=[ICO.check,ICO.pin,ICO.target];return STYLES.map((t,i)=>'<button class="opt '+(state.search.style===i?'on':'')+'" onclick="pickStyle('+i+')"><span class="oi" style="color:var(--teal)">'+sic[i]+'</span>'+t+'</button>').join('');}
 if(id==='range')return RANGES.map((r,i)=>'<button class="opt '+(state.search.range===i?'on':'')+'" onclick="pickRange('+i+')"><span class="oi" style="color:var(--teal)">'+ICO.car+'</span>'+r.label+'</button>').join('');
 if(id==='origin')return ORIGINS.map((o,i)=>'<button class="opt '+(state.search.origin===i?'on':'')+'" onclick="pickOrigin('+i+')"><span class="oi" style="color:var(--teal)">'+ICO.pin+'</span>'+o+'</button>').join('');
 return '';
}
function renderSetup(){
 let html='',answered=0,expanded=false,blocked=false;
 for(let qi=0;qi<QDEFS.length;qi++){
  const q=QDEFS[qi],val=qValue(q.id),editing=state.editing===q.id;
  if(!editing&&val!=null){
   answered++;

 c.addEventListener('pointermove',function(e){if(!on)return;dx=e.clientX-sx;c.style.transform='translateX('+dx+'px) rotate('+(dx/22)+'deg)';});

 }

 ];

function vScore(d,sk){var s=0;for(var i=0;i<d.themes.length;i++){if(sk.themes.indexOf(d.themes[i])>=0)s+=2;}if(d.badge===sk.badge)s+=1;return s;}
function applySkip(k,id){
 if(k!=='meh'&&id){
  var rest=state.candidates.slice(state.idx).map(byId);
  var arr=rest.slice();
  if(k==='cheap')arr.sort(function(a,b){return calcBudget(a).total-calcBudget(b).total;});
  if(k==='near')arr.sort(function(a,b){return a.hours-b.hours;});
  if(k==='vibe'){var sk=byId(id);arr.sort(function(a,b){return vScore(a,sk)-vScore(b,sk);});}
  if(k==='been'){var p=byId(id).pref;arr=arr.filter(function(d){return d.pref!==p;}).concat(arr.filter(function(d){return d.pref===p;}));}
  state.candidates=state.candidates.slice(0,state.idx).concat(arr.map(function(d){return d.id;}));
 }
 closeModal();
 renderSwipe();
 if(k!=='meh')toast('次の提案を調整しました ✨');
}

function applyUiColor(i){state.uiColor=i;var v=UI_COLORS[i].v;for(var k in v)document.documentElement.style.setProperty(k,v[k]);}
function setUiColor(i){applyUiColor(i);rerenderCurrent();openSettings();toast('カラーを「'+UI_COLORS[i].n+'」にしました 🎨');}
function openSettings(){
 openModal(mHead('設定')
 +'<div class="m-sub">デフォルトの出発地</div>'
 +'<div class="chips">'+ORIGINS.map(function(o,i){return '<button class="chip '+(state.search.origin===i?'on':'')+'" onclick="setOrigin('+i+')">'+o+'</button>';}).join('')+'</div>'
 +'<div class="m-sub">UIカラー</div>'
 +'<div class="chips">'+UI_COLORS.map(function(t,i){return '<button class="chip '+(state.uiColor===i?'on':'')+'" onclick="setUiColor('+i+')"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+t.v['--teal']+';margin-right:6px;vertical-align:-1px"></span>'+t.n+'</button>';}).join('')+'</div>'
 +'<div class="m-sub">写真</div>'
 +'<div class="chips"><button class="chip '+(state.photos?'on':'')+'" onclick="togglePhotos(true)">Wikipediaの写真</button><button class="chip '+(state.photos?'':'on')+'" onclick="togglePhotos(false)">イラストのみ</button></div>'
 +'<div class="m-sub">データ</div>'
 +'<button class="chip" style="color:#E5443C;border-color:#F2B6B2" onclick="resetAll()">お気に入り・検索条件をリセット</button>'
 +'<p style="color:var(--mut2);font-size:12px;line-height:1.7;margin-top:22px">Towavel Japan v4.0 — 国内・車の弾丸旅行用モック。データはこのページを開いている間だけ保持されます。写真はWikipedia／Wikimedia Commonsの各記事サムネイルを利用しています（通信できない場合や記事が見つからない場合はイラストを表示）。USER_PHOTOSで指定した画像は、提供元の利用条件の範囲でお使いください。</p>');
}
function setOrigin(i){state.search.origin=i;openSettings();toast('出発地を「'+ORIGINS[i]+'」にしました');}
function resetAll(){
 state.favs=[];state.visited=['神奈川'];
 state.search={date:null,nights:null,party:null,theme:null,style:null,range:null,origin:null,budget:1,inc:{trans:true,stay:true,food:true}};
 state.candidates=[];state.idx=0;
 closeModal();goHome();toast('リセットしました');
}
/* ---------- init ---------- */
$('#veil').addEventListener('click',function(e){if(e.target.id==='veil')closeModal();});
applyUiColor(state.uiColor);
goHome();
</script>
